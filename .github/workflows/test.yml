name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: "1.17.0"
          rebar3-version: "3"
          # elixir-version: "1"

      # --- WASM spec-suite toolchain --------------------------------------------
      # The conformance runner (test/twocore/conformance) drives the official
      # WebAssembly spec-suite through the compiler. The full fixture set is
      # gitignored and regenerated from a PINNED testsuite revision by vendor.sh,
      # which needs wabt (wat2wasm / wast2json / spectest-interp). Versions live in
      # test/twocore/conformance/vendor/PIN so this stays the single source of truth.
      - name: Read pinned toolchain versions
        id: pin
        run: |
          PIN=test/twocore/conformance/vendor/PIN
          echo "wabt=$(sed -n 's/^WABT_VERSION=//p' "$PIN")"        >> "$GITHUB_OUTPUT"
          echo "sha=$(sed -n 's/^TESTSUITE_SHA=//p' "$PIN")"        >> "$GITHUB_OUTPUT"

      - name: Install wabt (pinned)
        run: |
          v="${{ steps.pin.outputs.wabt }}"
          url="https://github.com/WebAssembly/wabt/releases/download/${v}/wabt-${v}-linux-x64.tar.gz"
          curl -fsSL "$url" -o /tmp/wabt.tar.gz
          mkdir -p /tmp/wabt
          tar -xzf /tmp/wabt.tar.gz -C /tmp/wabt --strip-components=1
          echo "/tmp/wabt/bin" >> "$GITHUB_PATH"

      - name: Verify wabt is on PATH
        run: |
          wat2wasm --version
          command -v wast2json
          command -v spectest-interp

      # Cache the cloned testsuite by its pinned SHA so we don't re-clone every run.
      - name: Cache vendored testsuite clone
        uses: actions/cache@v4
        with:
          path: build/conformance-vendor
          key: wasm-testsuite-${{ steps.pin.outputs.sha }}

      - run: gleam deps download

      # Regenerate the FULL allowlisted spec-suite fixtures (gitignored locally), so
      # `gleam test` runs the whole conformance allowlist rather than only the small
      # committed subset. The runner gate is: zero genuine FAILS (skips are expected
      # and reported for constructs beyond the current frontend slice).
      - name: Vendor WASM spec-suite fixtures (full allowlist)
        run: bash test/twocore/conformance/vendor/vendor.sh

      - run: gleam test
      - run: gleam format --check src test
